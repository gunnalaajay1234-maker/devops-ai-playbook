apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - boutique

  selector:
    matchLabels:
      app: gateway

  endpoints:
    - port: http
      path: /metrics
      interval: 15s