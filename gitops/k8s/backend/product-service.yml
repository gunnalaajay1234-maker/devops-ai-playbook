apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service
  namespace: boutique

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - >
              until nc -z boutique-postgres 5432;
              do
                echo waiting for postgres;
                sleep 5;
              done;

      containers:
        - name: product-service
          image: 995938832906.dkr.ecr.ap-south-1.amazonaws.com/product-service:b84e91fbdfed603d1ab930f31dd6dbd81927f280

          ports:
            - containerPort: 3003

          env:
            - name: NODE_ENV
              value: development

            - name: PORT
              value: "3003"

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: PRODUCTS_DB_URL

          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: product-service
  namespace: boutique

spec:
  selector:
    app: product-service

  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003

  type: ClusterIP