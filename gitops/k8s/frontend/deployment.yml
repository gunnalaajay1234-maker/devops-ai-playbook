apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: boutique

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: 995938832906.dkr.ecr.ap-south-1.amazonaws.com/frontend:47e57d6a3deaf094b348bc6a85bec7d70694fde6

          ports:
            - containerPort: 3000

          env:
            - name: REACT_APP_API_URL
              value: "http://gateway:3001/api"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: boutique

spec:
  selector:
    app: frontend

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

  type: ClusterIP